<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inline Event Handeling</title>

    <style>
        div {
            height: 100px;
            width: 100px;
            background-color: dodgerblue;
            color: white;
            border: 1px solid black;
        }
    </style>
</head>

<body>
    <button onclick="console.log('button was clicked'); alert('Hello, that was Mean!')">Click me</button>

    <button ondblclick="console.log('twice button was clicked'); alert('Hello this was good Man!!')">Click me 2
        Times</button>


    <div onmouseover="console.log('cursor was here')">This is a div</div>
</body>

</html>
