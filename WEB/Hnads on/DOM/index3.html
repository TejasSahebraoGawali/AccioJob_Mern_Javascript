<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: sans-serif;
        }

        #card {
            width: 250px;
            height: 200px;
            background-color: rgb(173, 179, 184);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 10px;
        }

        #btn {
            padding: 10px;
            width: 70px;
            border: none;
            border-radius: 5px;
            background-color: rgb(75, 161, 235);
            color: white;
            font-weight: bold;
            margin: 20px;
        }

        #num {
            font-size: 30px;
            font-weight: bold;
            margin: 0;
        }
    </style>
</head>

<body>
    <div id="card">
        <h3>Limited Counter 0 - 10</h3>
        <p id="num">0</p>
        <button id="btn">Add</button>
    </div>

    <script>
        document.getElementById("btn").addEventListener("click", () => {
            const p = document.getElementById("num");
            let value = Number(p.textContent);
            if (value < 10) {
                value += 1;
                p.textContent = value;
            }
        });
    </script>
</body>

</html>
