<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Movie Dashboard</title>

    <!-- BOOTSTRAP CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="styles.css">
</head>

<body class="bg-dark text-white">

    <!-- HEADER ONLY -->
    <header class="container py-5">
        <div class="row align-items-center">

            <!-- Poster -->
            <div class="col-md-4 text-center text-md-start mb-4">
                <img src="https://media.moctale.in/images/11a28a7d-9f96-4e91-bb13-6b0d6d3917dc.jpg"
                     class="img-fluid rounded" alt="The Shawshank Redemption">
            </div>

            <!-- Movie Info -->
            <div class="col-md-8">
                <p class="text-secondary">1994 • 2h 22m</p>

                <h1 class="fw-bold">The Shawshank Redemption</h1>

                <div class="row mt-4">
                    <div class="col-6 col-md-3">
                        <p class="text-secondary mb-1">Directed by</p>
                        <p>Frank Darabont</p>
                    </div>

                    <div class="col-6 col-md-3">
                        <p class="text-secondary mb-1">Country</p>
                        <p>USA</p>
                    </div>

                    <div class="col-6 col-md-3">
                        <p class="text-secondary mb-1">Language</p>
                        <p>English</p>
                    </div>

                    <div class="col-6 col-md-3">
                        <p class="text-secondary mb-1">Age Rating</p>
                        <p>16+</p>
                    </div>
                </div>
            </div>

        </div>
    </header>

    <script src="./script.js"></script>

</body>
</html>
