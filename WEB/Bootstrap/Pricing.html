<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pricing</title>
    <link rel="stylesheet" href="pricing.css">
</head>
<body>
    <h1>Our Pricing</h1>

    <div class="main">
        <div class="card">
            <h2 >Starter</h2>
            <h2 class="price">$9</h2>
            <p><b>&check;</b>  3 Projects</p>
            <p> <b>&check;</b> Basic Support</p>
            <button class="btn">Select</button>
        </div>

        <div class="card" id="selected">
            <h2 >Professional</h2>
            <h2 class="price">$19</h2>
            <p> <b>&check;</b> 10 Projects</p>
            <p> <b>&check;</b> Priority Support</p>
            <button class="btn">Select</button>
        </div>
        
        <div class="card">
            <h2 >Enterprise</h2>
            <h2 class="price">$29</h2>
            <p> <b>&check;</b> Unlimited Projects</p>
            <p> <b>&check;</b> Dedicated Support</p>
            <button class="btn">Select</button>
        </div>

    </div>
</body>
</html>
