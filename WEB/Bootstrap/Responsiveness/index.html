<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Responsive Layout with Grid</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css"
        integrity="sha384-xOolHFLEh07PJGoPkLv1IbcEPTNtaed2xpHsD9ESMhqIYd0nLMwNLD69Npy4HI+N" crossorigin="anonymous">
</head>

<body>
    <div class="container">
        <div class="row">
            <div class="bg-dark p-3 text-white col-4 col-sm-4 col-lg-4">Box1</div>
            <div class="bg-success p-3 text-white col-4 col-sm-4 col-lg-4">Box2</div>
            <div class="bg-danger p-3 text-white col-4 col-sm-4 col-lg-4">Box3</div>
        </div>
    </div>
    <br>
    <div class="container">
        <div class="row">
            <div class="bg-dark p-3 text-white col-4 col-sm-4 col-lg-4">Box1</div>
            <div class="bg-success p-3 text-white col-8 col-sm-8 col-lg-8">Box2</div>
        </div>
    </div>
    <br>
    <div class="container">
        <div class="row">
            <div class="bg-dark p-3 text-white col-12 col-sm-6 col-lg-4">Box1</div>
            <div class="bg-success p-3 text-white col-12 col-sm-6 col-lg-4">Box2</div>
            <div class="bg-danger p-3 text-white col-12 col-sm-6 col-lg-4">Box3</div>
        </div>
    </div>

</body>

</html>
