<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM 4</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-content: center;
        }


        #card {
            height: 170px;
            width: 200px;
            background-color: rgb(227, 230, 232);
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            margin-top: 250px;
            box-shadow: 0px 0px 2px 1px #000;
        }


        #num {
            font-size: 20px;
            font-weight: bold;
            margin: 0;
        }

        #add {
            padding: 10px;
            margin: 10px;
            border: none;
            border-radius: 5px;
            background-color: green;
            color: white;
            width: 70px;
        }
    </style>
</head>

<body>
    <div id="card">
        <h4>Limited Counter (0 - 10)</h4>
        <p id="num">0</p>
        <button id="add">Add</button>
    </div>



    <script>
        document.getElementById("add").addEventListener("click", () => {

            const p = document.getElementById("num");
            let value = Number(p.textContent);
            if (value < 10) {
                value++;
                num.textContent = value;
                msg.textContent = "Number Increased!";
            }
            else {
                msg.textContent = "Limit reached! You cannot go above 10";
            }
        });

    </script>
</body>

</html>
