<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ChatGPT UI Clone</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="logo">🤖</div>
    <nav class="menu">
      <a href="#" class="menu-item">📝 New chat</a>
      <a href="#" class="menu-item">🔍 Search chats</a>
      <a href="#" class="menu-item">📚 Library</a>
      <a href="#" class="menu-item">🕓 Codex</a>
    </nav>
  </aside>

  <!-- Main Area -->
  <div class="main">
    <!-- Top Navigation Bar -->
    <nav class="topbar">
      <div class="top-left">ChatGPT ▼</div>
      <div class="top-right">
        <button class="login">Log in</button>
        <button class="signup">Create a free account</button>
      </div>
    </nav>

    <!-- Center Content -->
    <div class="center-content">
      <h1>What’s on your mind today?</h1>
      <div class="input-box">
        <input type="text" placeholder="Ask anything" />
        <div class="files-mic">
          <span class="plus">+</span>
          <div class="mic">🎙️</div>
        </div>
      </div>
    </div>
  </div>
</body>

</html>
